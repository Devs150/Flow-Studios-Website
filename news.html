<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flow Studio News</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a; --bg2:#121212; --panel:rgba(255,255,255,0.06);
      --text:#fff; --muted:#bfbfbf; --accent:#ffffff; --accent2:#cccccc;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
    }
    header{
      position:sticky;top:0;z-index:10;
      background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
      padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .brand{font-weight:600;text-shadow:0 0 10px var(--accent);}
    nav a{
      color:var(--text);text-decoration:none;margin:0 0.75rem;font-weight:500;opacity:0.9;
      transition:color .2s ease, opacity .2s ease;
    }
    nav a:hover{color:var(--accent);opacity:1;text-shadow:0 0 8px var(--accent);}
    nav a.active{color:var(--accent);text-shadow:0 0 8px var(--accent);}
    .hero{
      text-align:center;padding:5rem 2rem 3rem;
      background:radial-gradient(1600px 800px at 50% -20%, #1b1b1b 0%, transparent 80%);
    }
    .hero h1{font-size:2.5rem;margin:0;text-shadow:0 0 15px var(--accent);}
    .hero p{color:var(--muted);margin-top:0.5rem;}
    section{padding:3rem 2rem;max-width:1100px;margin:0 auto}
    h2{margin-top:0;text-shadow:0 0 10px var(--accent);}
    .news-card{
      background:var(--panel);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;
      padding:1.5rem;
      margin-bottom:2rem;
      backdrop-filter:blur(6px);
      text-align:center;
    }
    .news-card h3{
      margin-top:0;
      text-shadow:0 0 8px var(--accent);
    }
    .news-card p{color:var(--muted);}
    footer{
      text-align:center;padding:2rem;color:var(--muted);
      border-top:1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">Flow Studio</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html">Games</a>
      <a class="active" href="news.html">News</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Studio News</h1>
    <p>Latest updates and announcements from Flow Studio.</p>
  </section>

  <section>
    <h2>Recent Updates</h2>

    <div class="news-card">
      <h3>Welcome</h3>
      <p>Posts coming soon.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 Flow Studio. All rights reserved.</p>
  </footer>

</body>
</html>
