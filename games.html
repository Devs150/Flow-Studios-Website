<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flow Studio Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a; --bg2:#121212; --panel:rgba(255,255,255,0.06);
      --text:#fff; --muted:#bfbfbf; --accent:#ffffff; --accent2:#cccccc;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
    }
    header{
      position:sticky;top:0;z-index:10;
      background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
      padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .brand{font-weight:600;text-shadow:0 0 10px var(--accent);}
    nav a{
      color:var(--text);text-decoration:none;margin:0 0.75rem;font-weight:500;opacity:0.9;
      transition:color .2s ease, opacity .2s ease;
    }
    nav a:hover{color:var(--accent);opacity:1;text-shadow:0 0 8px var(--accent);}
    nav a.active{color:var(--accent);text-shadow:0 0 8px var(--accent);}
    .hero{
      text-align:center;padding:5rem 2rem 3rem;
      background:radial-gradient(1600px 800px at 50% -20%, #1b1b1b 0%, transparent 80%);
    }
    .hero h1{font-size:2.5rem;margin:0;text-shadow:0 0 15px var(--accent);}
    .hero p{color:var(--muted);margin-top:0.5rem;}
    section{padding:3rem 2rem;max-width:1100px;margin:0 auto;text-align:center}
    h2{margin-top:0;text-shadow:0 0 10px var(--accent);}
    .game-btn{
      display:block;
      width:100%;
      max-width:600px;
      margin:1.5rem auto;
      padding:1.5rem;
      font-size:1.4rem;
      font-weight:700;
      color:#0a0a0a;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border:none;
      border-radius:12px;
      cursor:pointer;
      text-decoration:none;
      box-shadow:0 8px 24px rgba(255,255,255,0.25);
      transition:transform .15s ease, box-shadow .15s ease;
      text-shadow:0 0 10px var(--accent);
    }
    .game-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 20px var(--accent);
    }
    footer{
      text-align:center;padding:2rem;color:var(--muted);
      border-top:1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">Flow Studio</div>
    <nav>
      <a href="index.html">Home</a>
      <a class="active" href="games.html">Games</a>
      <a href="news.html">News</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Our Games</h1>
    <p>Explore titles crafted by Flow Studio.</p>
  </section>

  <section>
    <h2>Rec Room</h2>
    <a href="https://rec.net/room/RecTuberMultiShow" target="_blank" class="game-btn">RecTuber MultiShow</a>
  </section>

  <section>
    <h2>Originals</h2>
    <a href="#" class="game-btn">Originals</a>
  </section>

  <footer>
    <p>© 2026 Flow Studio. All rights reserved.</p>
  </footer>

</body>
</html>
